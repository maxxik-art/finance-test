let currentQuestion = 0;
let score = 0;

const question = document.getElementById("question");
const answers = document.getElementById("answers");
const info = document.getElementById("info");
const result = document.getElementById("result");
const progress = document.getElementById("progress");
const image = document.getElementById("question-image");

function showQuestion(){

let q = questions[currentQuestion];

progress.innerText = `Вопрос ${currentQuestion + 1} из ${questions.length}`;

image.src = q.image;

question.innerText = q.question;

answers.innerHTML = "";

info.innerText = q.info;

q.answers.forEach((answer,index)=>{

let button = document.createElement("button");

button.innerText = answer;

button.onclick = function(){

if(index === q.correct){
score++;
}

currentQuestion++;

if(currentQuestion < questions.length){
showQuestion();
}
else{
showResult();
}

};

answers.appendChild(button);

});

}

function showResult(){

question.style.display = "none";
answers.style.display = "none";
info.style.display = "none";

let percent = Math.round((score / questions.length) * 100);

let text = "";

if(percent < 40){
    text = "Ваш уровень финансовой грамотности низкий.";
}
else if(percent < 70){
    text = "У вас средний уровень финансовой грамотности.";
}
else{
    text = "Вы финансово грамотный человек!";
}

result.innerHTML =
`
<h2>Тест завершён!</h2>

<p>Правильных ответов: ${score} из ${questions.length}</p>

<p>Результат: ${percent}%</p>

<p>${text}</p>
`;

}

const startBtn = document.getElementById("start-btn");

question.style.display = "none";
answers.style.display = "none";
info.style.display = "none";

startBtn.onclick = function(){

    startBtn.style.display = "none";

    question.style.display = "block";
    answers.style.display = "block";
    info.style.display = "block";

    showQuestion();

};
